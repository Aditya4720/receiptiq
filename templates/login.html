<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ReceiptIQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sky: #38bdf8;
            --indigo: #6366f1;
            --pink: #f472b6;
            --bg: #020617;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --muted: rgba(255,255,255,0.45);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 70% 80%, rgba(56,189,248,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-wrap {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-logo {
            display: block;
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--sky), var(--indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            margin-bottom: 32px;
        }

        .auth-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }

        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .auth-sub {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        /* Error / success message from Flask */
        .auth-error {
            background: rgba(244,114,182,0.1);
            border: 1px solid rgba(244,114,182,0.25);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--pink);
            margin-bottom: 24px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.2); }

        input:focus {
            border-color: rgba(99,102,241,0.5);
            background: rgba(99,102,241,0.06);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--sky), var(--indigo));
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(56,189,248,0.2);
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(99,102,241,0.4);
        }

        .btn-submit:active { transform: scale(0.98); }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--sky);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .auth-footer a:hover { color: #fff; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: rgba(255,255,255,0.15);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Floating label animation */
        .field { position: relative; }

        .back-home {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-home:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="auth-wrap">

        <a href="/" class="auth-logo">ReceiptIQ</a>

        <div class="auth-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-sub">Sign in to your expense dashboard</p>

            {% if error %}
            <div class="auth-error">⚠ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="field">
                    <label for="email">Email address</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit">Sign in →</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one free</a>
            </div>
        </div>

        <a href="/" class="back-home" style="margin-top: 20px;">← Back to home</a>
    </div>

</body>
</html>
